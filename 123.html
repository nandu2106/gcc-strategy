<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>LAN Diagram — AR Hologram</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; width:100%; height:100%; background:#05060a; font-family: -apple-system, Segoe UI, Roboto, sans-serif; }
  canvas { display:block; }

  #overlay {
    position:fixed; inset:0; z-index:10;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; color:#eaf2ff; pointer-events:none;
  }
  #card {
    pointer-events:auto;
    background:rgba(10,14,28,0.72);
    border:1px solid rgba(120,170,255,0.35);
    border-radius:18px;
    padding:28px 26px 24px;
    max-width:380px;
    box-shadow:0 0 40px rgba(60,120,255,0.18), inset 0 0 30px rgba(60,120,255,0.06);
    backdrop-filter: blur(6px);
  }
  #card h1 {
    font-size:18px; margin:0 0 6px; letter-spacing:0.3px; color:#fff;
  }
  #card p {
    font-size:13px; line-height:1.5; color:#9fb3d9; margin:0 0 18px;
  }
  #enterBtn {
    pointer-events:auto;
    background:linear-gradient(135deg,#5b8cff,#7b5bff);
    color:#fff; border:none; border-radius:30px;
    font-size:15px; font-weight:600; letter-spacing:0.3px;
    padding:13px 30px; cursor:pointer;
    box-shadow:0 6px 20px rgba(91,140,255,0.45);
    transition:transform 0.15s ease, box-shadow 0.15s ease;
  }
  #enterBtn:active { transform:scale(0.96); }
  #enterBtn:disabled { opacity:0.45; box-shadow:none; cursor:default; }

  #status {
    pointer-events:auto;
    margin-top:14px; font-size:12px; color:#7e93bb; min-height:16px;
  }

  #exitHint {
    position:fixed; bottom:18px; left:0; right:0; text-align:center;
    color:rgba(255,255,255,0.55); font-size:12px; z-index:11; display:none;
    pointer-events:none;
  }

  .badge {
    display:inline-block; font-size:10px; letter-spacing:1.2px; text-transform:uppercase;
    color:#7fd1ff; border:1px solid rgba(127,209,255,0.4); border-radius:20px;
    padding:4px 10px; margin-bottom:14px;
  }
</style>
</head>
<body>

<div id="overlay">
  <div id="card">
    <div class="badge">WebXR · Passthrough AR</div>
    <h1>Head Campus LAN — Holo Panel</h1>
    <p>Put on your Meta Quest, tap below, and grant camera access. The network diagram will float in front of you as a glowing 3D panel in your real room.</p>
    <button id="enterBtn" disabled>Checking device…</button>
    <div id="status"></div>
  </div>
</div>

<div id="exitHint">Look at the floating panel · Press the Oculus button to exit AR</div>

  var renderer, scene, camera, panelGroup, glow, clock;
  var session = null;

  function initThree(){
    renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x05060a, 1);
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);

    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.01, 50);
    camera.position.set(0, 1.5, 2.4);

    scene.add(new THREE.AmbientLight(0xffffff, 1.1));
    var dl = new THREE.DirectionalLight(0xbfd6ff, 0.8);
    dl.position.set(1, 2, 1);
    scene.add(dl);

    clock = new THREE.Clock();

    var loader = new THREE.TextureLoader();
    loader.load(IMG_DATA, function(tex){
      tex.encoding = THREE.sRGBEncoding;
      buildPanel(tex);
    });

    window.addEventListener('resize', onResize);
    renderer.setAnimationLoop(render);
  }

  function softGlowTexture(){
    var c = document.createElement('canvas');
    c.width = c.height = 256;
    var ctx = c.getContext('2d');
    var g = ctx.createRadialGradient(128,128,0,128,128,128);
    g.addColorStop(0, 'rgba(120,170,255,0.55)');
    g.addColorStop(0.5, 'rgba(110,90,255,0.22)');
    g.addColorStop(1, 'rgba(110,90,255,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,256,256);
    return new THREE.CanvasTexture(c);
  }

  function buildPanel(tex){
    var aspect = tex.image.width / tex.image.height;
    var planeW = 1.05;
    var planeH = planeW / aspect;

    panelGroup = new THREE.Group();
    panelGroup.position.set(0, 1.45, -1.6);

    // glow backing
    var glowTex = softGlowTexture();
    var glowGeo = new THREE.PlaneGeometry(planeW*1.7, planeH*1.7);
    var glowMat = new THREE.MeshBasicMaterial({
      map: glowTex, transparent:true, blending: THREE.AdditiveBlending,
      depthWrite:false, side: THREE.DoubleSide
    });
    glow = new THREE.Mesh(glowGeo, glowMat);
    glow.position.z = -0.02;
    panelGroup.add(glow);

    // main image panel
    var geo = new THREE.PlaneGeometry(planeW, planeH);
    var mat = new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide, transparent:true });
    var mesh = new THREE.Mesh(geo, mat);
    panelGroup.add(mesh);

    // thin glowing frame edges
    var edges = new THREE.EdgesGeometry(geo);
    var frame = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color:0x7fd1ff, transparent:true, opacity:0.85 }));
    frame.position.z = 0.005;
    panelGroup.add(frame);

    // drifting particles
    var pGeo = new THREE.BufferGeometry();
    var count = 60;
    var positions = new Float32Array(count*3);
    var speeds = new Float32Array(count);
    for (var i=0;i<count;i++){
      positions[i*3]   = (Math.random()-0.5) * planeW * 1.9;
      positions[i*3+1] = (Math.random()-0.5) * planeH * 1.9;
      positions[i*3+2] = (Math.random()-0.5) * 0.4;
      speeds[i] = 0.1 + Math.random()*0.25;
    }
    pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    var pMat = new THREE.PointsMaterial({ color:0x9fd0ff, size:0.012, transparent:true, opacity:0.85, blending: THREE.AdditiveBlending, depthWrite:false });
    var points = new THREE.Points(pGeo, pMat);
    panelGroup.userData.particleSpeeds = speeds;
    panelGroup.add(points);
    panelGroup.userData.points = points;

    scene.add(panelGroup);
  }

  function render(){
    var t = clock.getElapsedTime();
    if (panelGroup){
      panelGroup.position.y = 1.45 + Math.sin(t*0.8)*0.035;
      panelGroup.rotation.y = Math.sin(t*0.3)*0.06;
      panelGroup.rotation.x = Math.sin(t*0.25)*0.02;
      if (glow) glow.material.opacity = 0.7 + Math.sin(t*1.4)*0.15;

      var pts = panelGroup.userData.points;
      if (pts){
        var pos = pts.geometry.attributes.position;
        var speeds = panelGroup.userData.particleSpeeds;
        for (var i=0;i<pos.count;i++){
          var y = pos.getY(i) + Math.sin(t*speeds[i]+i)*0.0007;
          pos.setY(i, y);
        }
        pos.needsUpdate = true;
      }
    }
    renderer.render(scene, camera);
  }

  function onResize(){
    if (renderer.xr.isPresenting) return;
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }

  function checkSupport(){
    if (navigator.xr && navigator.xr.isSessionSupported){
      navigator.xr.isSessionSupported('immersive-ar').then(function(supported){
        if (supported){
          btn.disabled = false;
          btn.textContent = 'Enter AR';
        } else {
          btn.textContent = 'AR not supported here';
          statusEl.textContent = 'Open this page in the Meta Quest Browser to view in passthrough AR.';
        }
      }).catch(function(){
        btn.textContent = 'AR not supported here';
      });
    } else {
      btn.textContent = 'WebXR not available';
      statusEl.textContent = 'Open this page in the Meta Quest Browser to view in passthrough AR.';
    }
  }

  function enterAR(){
    if (session) return;
    statusEl.textContent = 'Requesting camera access…';
    navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['local-floor'],
      optionalFeatures: ['bounded-floor']
    }).then(function(s){
      session = s;
      renderer.xr.setSession(session);
      overlay.style.display = 'none';
      exitHint.style.display = 'block';
      session.addEventListener('end', function(){
        session = null;
        overlay.style.display = 'flex';
        exitHint.style.display = 'none';
      });
    }).catch(function(err){
      statusEl.textContent = 'Could not start AR: ' + err.message;
    });
  }

  btn.addEventListener('click', enterAR);
  initThree();
  checkSupport();
})();
</script>
</body>
</html>
